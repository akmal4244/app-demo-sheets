<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submissions Dashboard</title>
  <!-- Google Fonts for modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at 0% 0%, #1a103c 0%, #0d0822 50%, #05030f 100%);
      --accent-color: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.4);
      --accent-gradient: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --item-bg: rgba(255, 255, 255, 0.02);
      --item-border: rgba(255, 255, 255, 0.05);
      --item-hover-bg: rgba(255, 255, 255, 0.05);
      --item-hover-border: rgba(139, 92, 246, 0.3);
      --error-color: #ef4444;
      --phone-color: #38bdf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Decorative background blobs for rich modern look */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(140px);
      z-index: -1;
      opacity: 0.2;
      pointer-events: none;
    }

    body::before {
      background: #7c3aed;
      top: 5%;
      left: 5%;
      animation: float-slow 25s infinite alternate;
    }

    body::after {
      background: #db2777;
      bottom: 5%;
      right: 5%;
      animation: float-slow 30s infinite alternate-reverse;
    }

    @keyframes float-slow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, 60px) scale(1.15); }
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
      animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fade-in-up {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 20px;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff 30%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .badge {
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.3);
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #a78bfa;
    }

    /* List styling */
    #list {
      list-style-type: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #list li {
      background: var(--item-bg);
      border: 1px solid var(--item-border);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      overflow: hidden;
      animation: slide-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slide-in {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #list li:hover {
      background: var(--item-hover-bg);
      border-color: var(--item-hover-border);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .contact-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 8px;
      font-size: 1.1rem;
    }

    .contact-name {
      font-weight: 600;
      color: var(--text-main);
    }

    .contact-email {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 400;
    }

    .contact-phone {
      color: var(--phone-color);
      font-size: 0.85rem;
      background: rgba(56, 189, 248, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      margin-left: 8px;
    }

    .contact-message {
      color: #d1d5db;
      font-size: 1rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(0, 0, 0, 0.1);
      padding: 12px 16px;
      border-radius: 10px;
      border-left: 3px solid var(--accent-color);
    }

    .contact-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 4px;
    }

    .contact-date {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 400;
    }

    /* Message / Status display */
    .status-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 1.1rem;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .status-msg.error {
      color: var(--error-color);
    }

    /* Skeleton Loader */
    .skeleton-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .skeleton-card {
      height: 140px;
      background: linear-gradient(90deg, rgba(255,255,255,0.01) 25%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.01) 75%);
      background-size: 200% 100%;
      animation: loading-shimmer 1.5s infinite;
      border-radius: 16px;
      border: 1px solid var(--card-border);
    }

    @keyframes loading-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Action bar */
    .actions {
      display: flex;
      gap: 12px;
    }

    .btn-action {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-action:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-action:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-section">
      <h1>All submissions</h1>
      <div class="actions">
        <button id="refreshBtn" class="btn-action" onclick="loadSubmissions()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
          Refresh
        </button>
        <span id="countBadge" class="badge" style="display: none;">0 submissions</span>
      </div>
    </div>
    
    <div id="loader" class="skeleton-list">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <ul id="list" style="display: none;"></ul>
    <div id="statusContainer"></div>
  </div>

  <script>
    const listElement = document.getElementById("list");
    const loaderElement = document.getElementById("loader");
    const statusContainer = document.getElementById("statusContainer");
    const countBadge = document.getElementById("countBadge");
    const refreshBtn = document.getElementById("refreshBtn");
    
    const URL = "https://script.google.com/macros/s/AKfycbxJS2eBqb4Z7Exhtf_TBB555ErwQXPHadCvTsMC09DLhSgACVONc8E0jBGTbFufOfDA6w/exec";

    function showStatus(message, isError = false) {
      listElement.style.display = "none";
      loaderElement.style.display = "none";
      countBadge.style.display = "none";
      
      statusContainer.innerHTML = `
        <div class="status-msg ${isError ? 'error' : ''}">
          <p>${message}</p>
          ${isError ? '<button class="btn-action" onclick="loadSubmissions()">Retry</button>' : ''}
        </div>
      `;
    }

    function formatDate(dateString) {
      if (!dateString) return '';
      try {
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return dateString;
        return date.toLocaleString(undefined, {
          dateStyle: 'medium',
          timeStyle: 'short'
        });
      } catch (e) {
        return dateString;
      }
    }

    async function loadSubmissions() {
      // Enter loading state
      loaderElement.style.display = "flex";
      listElement.style.display = "none";
      statusContainer.innerHTML = "";
      countBadge.style.display = "none";
      refreshBtn.disabled = true;

      try {
        // EXACT shape as requested to avoid CORS issues
        const res = await fetch(URL);
        const data = await res.json();

        if (data && data.ok && Array.isArray(data.contacts)) {
          const contacts = data.contacts;
          
          if (contacts.length === 0) {
            showStatus("No submissions yet");
          } else {
            // Sort contacts descending by date if possible
            contacts.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

            listElement.innerHTML = "";
            contacts.forEach((contact, index) => {
              const li = document.createElement("li");
              li.style.animationDelay = `${index * 0.05}s`;

              // Safely construct name and email elements
              const headerDiv = document.createElement("div");
              headerDiv.className = "contact-header";

              const nameSpan = document.createElement("span");
              nameSpan.className = "contact-name";
              nameSpan.textContent = contact.name || "Anonymous";

              const emailSpan = document.createElement("span");
              emailSpan.className = "contact-email";
              emailSpan.textContent = contact.email ? `(${contact.email})` : "";

              headerDiv.appendChild(nameSpan);
              headerDiv.appendChild(emailSpan);

              // Include phone if present
              if (contact.phone) {
                const phoneSpan = document.createElement("span");
                phoneSpan.className = "contact-phone";
                phoneSpan.textContent = contact.phone;
                headerDiv.appendChild(phoneSpan);
              }

              const msgParagraph = document.createElement("p");
              msgParagraph.className = "contact-message";
              msgParagraph.textContent = contact.message || "";

              const footerDiv = document.createElement("div");
              footerDiv.className = "contact-footer";

              const dateSmall = document.createElement("small");
              dateSmall.className = "contact-date";
              dateSmall.textContent = formatDate(contact.created_at);

              footerDiv.appendChild(dateSmall);

              li.appendChild(headerDiv);
              li.appendChild(msgParagraph);
              li.appendChild(footerDiv);

              listElement.appendChild(li);
            });

            // Show list
            loaderElement.style.display = "none";
            listElement.style.display = "flex";
            
            // Show count badge
            countBadge.textContent = `${contacts.length} submission${contacts.length > 1 ? 's' : ''}`;
            countBadge.style.display = "inline-block";
          }
        } else {
          showStatus("Couldn't load — try again later", true);
        }
      } catch (error) {
        console.error("Fetch error:", error);
        showStatus("Couldn't load — try again later", true);
      } finally {
        refreshBtn.disabled = false;
      }
    }

    // Load on page startup
    document.addEventListener("DOMContentLoaded", loadSubmissions);
  </script>
</body>
</html>

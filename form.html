<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <!-- Google Fonts for modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at 0% 0%, #1a103c 0%, #0d0822 50%, #05030f 100%);
      --accent-color: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.4);
      --accent-gradient: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(255, 255, 255, 0.02);
      --input-border: rgba(255, 255, 255, 0.1);
      --input-focus-border: rgba(139, 92, 246, 0.6);
      --success-color: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Decorative background blobs for rich modern look */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      opacity: 0.25;
      pointer-events: none;
    }

    body::before {
      background: #7c3aed;
      top: 10%;
      left: 10%;
      animation: float-slow 20s infinite alternate;
    }

    body::after {
      background: #db2777;
      bottom: 10%;
      right: 10%;
      animation: float-slow 25s infinite alternate-reverse;
    }

    @keyframes float-slow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
      animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fade-in-up {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ffffff 30%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 32px;
      font-weight: 300;
    }

    .form-group {
      position: relative;
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: var(--text-muted);
      transition: color 0.3s ease;
    }

    .form-group:focus-within label {
      color: #a78bfa;
    }

    .input-control {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text-main);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    .input-control::placeholder {
      color: rgba(255, 255, 255, 0.15);
    }

    .input-control:hover {
      border-color: rgba(255, 255, 255, 0.2);
    }

    .input-control:focus {
      border-color: var(--accent-color);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    textarea.input-control {
      resize: vertical;
      min-height: 120px;
    }

    .btn-submit {
      width: 100%;
      background: var(--accent-gradient);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      top: 0;
      left: -50%;
      width: 200%;
      height: 100%;
      background: linear-gradient(
        to right,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.3) 50%,
        rgba(255, 255, 255, 0) 100%
      );
      transform: skewX(-25deg);
      transition: 0.75s;
      opacity: 0;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(124, 58, 237, 0.5);
    }

    .btn-submit:hover::after {
      left: 125%;
      opacity: 1;
    }

    .btn-submit:active {
      transform: translateY(1px);
      box-shadow: 0 2px 10px rgba(124, 58, 237, 0.3);
    }

    .btn-submit:disabled {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #msg {
      margin-top: 24px;
      font-size: 0.95rem;
      text-align: center;
      min-height: 24px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      color: var(--success-color);
      font-weight: 500;
    }

    #msg.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Small loading spinner */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading .spinner {
      display: block;
    }
    .loading .btn-text {
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Contact us</h1>
    <p class="subtitle">Drop us a line and we'll get back to you shortly.</p>
    
    <form id="contactForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" class="input-control" placeholder="Your name" required autocomplete="name">
      </div>
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" class="input-control" placeholder="your.email@example.com" required autocomplete="email">
      </div>
      
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" class="input-control" placeholder="How can we help you?" required></textarea>
      </div>
      
      <button type="submit" id="submitBtn" class="btn-submit">
        <span class="spinner"></span>
        <span class="btn-text">Send Message</span>
      </button>
    </form>
    
    <p id="msg"></p>
  </div>

  <script>
    const form = document.getElementById("contactForm");
    const submitBtn = document.getElementById("submitBtn");
    const msgElement = document.getElementById("msg");
    const URL = "https://script.google.com/macros/s/AKfycbxJS2eBqb4Z7Exhtf_TBB555ErwQXPHadCvTsMC09DLhSgACVONc8E0jBGTbFufOfDA6w/exec";

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      // Clear previous message classes and content
      msgElement.classList.remove("show");
      msgElement.textContent = "";

      // Enter loading state
      submitBtn.disabled = true;
      submitBtn.classList.add("loading");

      // Extract form data
      const data = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        message: document.getElementById("message").value.trim()
      };

      try {
        // EXACT shape as requested
        await fetch(URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(data)
        });

        // Opaque success transition
        msgElement.textContent = "Thanks! We'll get back to you.";
        msgElement.classList.add("show");
        form.reset();

      } catch (error) {
        console.error("Submission error:", error);
        // Fallback display (even with no-cors, fetch might fail e.g., network error)
        msgElement.textContent = "Something went wrong. Please try again.";
        msgElement.style.color = "#ef4444";
        msgElement.classList.add("show");
      } finally {
        // Reset button loading state
        submitBtn.disabled = false;
        submitBtn.classList.remove("loading");
      }
    });
  </script>
</body>
</html>
